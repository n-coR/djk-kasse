<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DJK Gramschatz Kasse</title>
<style>
    :root {
        --djk-yellow: #f2c200;
        --bg-light: #ffffff;
        --text-light: #000000;
        --bg-dark: #1a1a1a;
        --text-dark: #ffffff;
        --button-dark: #333333;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: var(--bg-light);
        color: var(--text-light);
        transition: background 0.3s, color 0.3s;
    }

    /* Header */
    header {
        background: var(--bg-light);
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 4px solid var(--djk-yellow);
    }
    header img {
        height: 70px;
    }

    /* Darkmode Toggle */
    #darkToggle {
        font-size: 32px;
        cursor: pointer;
        padding: 10px;
    }

    /* Summe + Abschluss oben */
    #topBar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
    }

#topButtons {
    display: flex;
    gap: 10px;
}

.topBtn {
    padding: 15px 20px;
    font-size: 24px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    border: none;
}

/* Farben */
.topBtn.neu {
    background: #000;
    color: #fff;
}

.topBtn.storno {
    background: #8b0000;
    color: #fff;
}

.topBtn.abschluss {
    background: #444;
    color: #fff;
}

/* Darkmode */
.dark .topBtn.neu {
    background: #f2f2f2;
    color: #000;
}

.dark .topBtn.storno {
    background: #8b0000;
    color: #fff;
}

.dark .topBtn.abschluss {
    background: #666;
    color: #fff;
}


    #summe {
        font-size: 48px;
        font-weight: bold;
    }
    #abschlussTop {
        background: #444;
        color: white;
        padding: 15px 25px;
        font-size: 26px;
        border-radius: 10px;
        cursor: pointer;
    }

    #neuTop {
        background: #444;
        color: white;
        padding: 15px 25px;
        font-size: 26px;
        border-radius: 10px;
        cursor: pointer;
    }

    #stornoTop {
        background: #444;
        color: white;
        padding: 15px 25px;
        font-size: 26px;
        border-radius: 10px;
        cursor: pointer;
    }

    /* Layout */
    .layout {
        display: flex;
        height: calc(100vh - 200px);
    }

    /* Linke Seite */
    #vorgang {
        width: 40%;
        padding: 15px;
        border-right: 3px solid var(--djk-yellow);
        font-size: 24px;
        background: rgba(255,255,255,0.85);
    }
    #vorgang h2 {
        margin-top: 0;
        font-size: 28px;
    }
    #itemList {
        list-style: none;
        padding: 0;
        margin: 0 0 20px 0;
        max-height: 300px;
        overflow-y: auto;
    }
    #itemList li {
        padding: 6px 0;
        border-bottom: 1px solid #ddd;
    }

    /* Rechte Seite */
    #buttons {
        width: 60%;
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-content: flex-start;
        background: rgba(255,255,255,0.85);
    }

    .button {
        width: 45%;
        height: 80px;
        margin: 8px;
        background: var(--djk-yellow);
        border: none;
        border-radius: 10px;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
    }
    .button:active {
        background: #d9ab00;
    }

    .storno {
        background: #8b0000;
        color: white;
    }
    .neu {
        background: #000000;
        color: white;
    }

    /* Pop-Up */
    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    #popup {
        background: var(--bg-light);
        width: 80%;
        max-width: 500px;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        border: 6px solid var(--djk-yellow);
        color: var(--text-light);
    }

    #popup h2 {
        background: var(--djk-yellow);
        color: black;
        padding: 15px;
        border-radius: 10px;
        font-size: 32px;
        margin-top: 0;
        margin-bottom: 20px;
    }

    #popup input {
        width: 80%;
        font-size: 28px;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 10px;
        text-align: right;
        margin-top: 10px;
    }

    #popupRueckgeld {
        font-size: 40px;
        font-weight: bold;
        margin-top: 20px;
    }

    #closePopup {
        margin-top: 25px;
        background: #000000;
        color: white;
        padding: 15px 30px;
        font-size: 26px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    /* Darkmode */
    .dark body {
        background: var(--bg-dark);
        color: var(--text-dark);
    }
    .dark #popup {
        background: var(--bg-dark);
        color: var(--text-dark);
    }
    .dark .button {
        background: var(--button-dark);
        color: white;
    }

/* Darkmode Fixes */
.dark #vorgang {
    background: rgba(40,40,40,0.9);
    color: var(--text-dark);
}

.dark #buttons {
    background: rgba(40,40,40,0.9);
}

.dark .button {
    background: var(--button-dark);
    color: white;
}

.dark .button:active {
    background: #555;
}

/* Storno bleibt rot */
.dark .storno {
    background: #8b0000;
    color: white;
}

/* Neu-Button im Darkmode hell statt schwarz */
.dark .neu {
    background: #f2f2f2;
    color: #000;
}

/* Abschluss-Button oben */
.dark #abschlussTop {
    background: #666;
    color: white;
}

/* Pop-Up im Darkmode */
.dark #popup {
    background: #2a2a2a;
    color: var(--text-dark);
}

.dark #popup h2 {
    background: var(--djk-yellow);
    color: black;
}

.dark #closePopup {
    background: #f2f2f2;
    color: #000;
}

</style>
</head>
<body>

<header>
    <img src="https://djkgramschatz.de/wp2020/wp-content/uploads/2020/01/DJK_Logo.png">
    <h1>Sportfest 2026</h1>
   <!-- <div id="darkToggle" onclick="toggleDark()">🌙</div> -->
</header>

<div id="topBar">
    <div id="summe">0,00 €</div>

    <div id="topButtons">
        <button class="topBtn neu" onclick="resetAll()">Neu</button>
        <button class="topBtn storno" onclick="undo()">Storno</button>
        <button class="topBtn abschluss" onclick="openPopup()">Abschluss</button>
    </div>
</div>


<div class="layout">

    <!-- Linke Seite -->
    <div id="vorgang">
        <h2>Aktueller Vorgang</h2>
        <ul id="itemList"></ul>
    </div>

    <!-- Rechte Seite -->
    <div id="buttons">
        <button class="button" onclick="add('Pfand', 1)">Pfand +1</button>
        <button class="button" onclick="add('Pfand zurück', -1)">Pfand zurück -1</button>

<button class="button" onclick="addDrink('0,5 l Bier / Radler', 3.5)">Bier/Radler 3,50</button>
<button class="button" onclick="addDrink('Maß Bier', 7)">Maß 7,00</button>
<button class="button" onclick="addDrink('Schoppen', 3.5)">Schoppen 3,50</button>
<button class="button" onclick="addDrink('Weinschorle', 2.5)">Weinschorle 2,50</button>
<button class="button" onclick="addDrink('Wasser', 2)">Wasser 2,00</button>
<button class="button" onclick="addDrink('Alkoholfrei', 2.5)">Alkoholfrei 2,50</button>
<button class="button" onclick="addDrink('Radler Natur 0,33 l', 3)">Radler Natur 3,00</button>

    </div>
</div>

<!-- Pop-Up -->
<div id="overlay">
    <div id="popup">
        <h2>Zu zahlen: <span id="popupSumme">0,00 €</span></h2>

        <input type="number" id="popupGegeben" placeholder="Gegeben" oninput="calcPopupRueckgeld()">

        <div id="popupRueckgeld">Rückgeld: 0,00 €</div>

        <button id="closePopup" onclick="closePopup()">Schließen</button>
    </div>
</div>

<script>
    let total = 0;
    let history = [];
    let dark = false;

    function add(name, amount) {
        history.push({name, amount});
        total += amount;
        update();
    }

    function undo() {
        if (history.length > 0) {
            let last = history.pop();
            total -= last.amount;
            update();
        }
    }

    function resetAll() {
        history = [];
        total = 0;
        update();
    }

    function update() {
        document.getElementById("summe").innerText =
            total.toFixed(2).replace(".", ",") + " €";

        let list = document.getElementById("itemList");
        list.innerHTML = "";

history.forEach(item => {
    let li = document.createElement("li");

    if (item.name === "Pfand") {
        li.style.fontSize = "18px";
        li.style.color = "#555";
        li.textContent = "↳ Pfand – " +
            item.amount.toFixed(2).replace(".", ",") + " €";
    } else {
        li.style.fontSize = "24px";
        li.textContent = item.name + " – " +
            item.amount.toFixed(2).replace(".", ",") + " €";
    }

    list.appendChild(li);
});

document.getElementById("itemList").scrollTop =
    document.getElementById("itemList").scrollHeight;

    }

    /* Pop-Up */
    function openPopup() {
        document.getElementById("popupSumme").innerText =
            total.toFixed(2).replace(".", ",") + " €";
        document.getElementById("popupGegeben").value = "";
        document.getElementById("popupRueckgeld").innerText = "Rückgeld: 0,00 €";
        document.getElementById("overlay").style.display = "flex";
    }

    function closePopup() {
        document.getElementById("overlay").style.display = "none";
    }

    function calcPopupRueckgeld() {
        let gegeben = parseFloat(document.getElementById("popupGegeben").value);
        if (isNaN(gegeben)) {
            document.getElementById("popupRueckgeld").innerText = "Rückgeld: 0,00 €";
            return;
        }
        let rueck = gegeben - total;
        document.getElementById("popupRueckgeld").innerText =
            "Rückgeld: " + rueck.toFixed(2).replace(".", ",") + " €";
    }

    /* Darkmode */
function toggleDark() {
    dark = !dark;
    if (dark) {
        document.body.classList.add("dark");
    } else {
        document.body.classList.remove("dark");
    }
}

function addDrink(name, price) {
    // Hauptartikel
    history.push({name: name, amount: price});
    total += price;

    // Automatischer Pfand
    history.push({name: "Pfand", amount: 1});
    total += 1;

    update();
}

</script>

</body>
</html>
